plugins {
    // Plugins automatically generated by MLGradleWriter.kt
    alias(libs.plugins.android.application)
}

android {
    namespace 'alienkrishn.armkiller'
    compileSdk 36

    defaultConfig {
        applicationId 'alienkrishn.armkiller'
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName '1.0'
        buildToolsVersion = "36.1.0"
        ndkVersion = "29.0.14206865"

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    buildFeatures {
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation libs.androidx.core
    implementation libs.androidx.appcompat
    implementation libs.material
    implementation libs.androidx.constraintlayout

    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // Exclude conflicting Guava and ErrorProne classes from both dependencies
    implementation('com.github.MuntashirAkon:apksig-android:4.4.0') {
        exclude group: 'com.google.guava', module: 'listenablefuture'
        exclude group: 'com.google.errorprone', module: 'error_prone_annotations'
    }

    implementation('com.github.MuntashirAkon:sun-security-android:1.0') {
        exclude group: 'com.google.guava', module: 'listenablefuture'
        exclude group: 'com.google.errorprone', module: 'error_prone_annotations'
    }
}

// Optional: global fallback to catch any other transitive duplicates
configurations.all {
    exclude group: 'com.google.guava', module: 'listenablefuture'
    exclude group: 'com.google.errorprone', module: 'error_prone_annotations'
}
